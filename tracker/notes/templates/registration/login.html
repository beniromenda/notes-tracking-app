{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
    <link rel="stylesheet" href="{% static 'notes/login.css' %}">
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Log in to access your notes</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Log in</button>
        </form>
    </div>
</body>
</html>
