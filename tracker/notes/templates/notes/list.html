{% extends 'notes/base.html' %}

{% block title %} All Notes {% endblock %}

{% block content %}
<a href="{% url 'note_create' %}">+ New Note</a>

<ul>
  {% for note in notes %}
  <li>
    <strong>{{ note.title }}</strong> - {{ note.content }}
    <a href="{% url 'note_update' note.pk %}">Edit</a>
    <a href="{% url 'note_delete' note.pk %}">Delete</a>
  </li>
  {% empty %}
  <li>No notes yet.</li>
  {% endfor %}
</ul>
{% endblock %}
