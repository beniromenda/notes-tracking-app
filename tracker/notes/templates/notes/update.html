{% extends 'notes/base.html' %}

{% block title %}Update Note{% endblock %}

{% block content %}
<h2>Edit Note</h2>

<form method="post" action="{% url 'note_update' note.pk%}">
  {% csrf_token %}
  {{ form.as_p }}

  <button type="submit">Save Changes</button>
  <a href="{% url 'note_list' %}">Cancel</a>
</form>
{% endblock %}
