{% extends 'notes/base.html' %}

{% block title %}New Note{% endblock %}

{% block content %}
<form method="POST">
  {% csrf_token %}
  <label>Title:</label>
  <input type="text" name="title" required />
  <br />
  <label>Content:</label>
  <textarea name="content" required></textarea>
  <br />
  <button type="submit">Save</button>
</form>
{% endblock %}
